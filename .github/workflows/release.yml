name: Release HA addon

# Triggered when a vX.Y.Z tag is pushed. Builds the addon image per
# supported HA architecture and publishes to GHCR under
# ghcr.io/sandydargoport/prism-ha-<arch>:<version> + :latest.
#
# Once the first tagged build is published, HA Supervisor pulls the
# image directly (per the `image:` field in ha-app/config.yaml) instead
# of building from source on the user's host — install time drops from
# ~10 min to ~30 s.
#
# Pre-req for the workflow to succeed:
#   - Repository has Actions enabled with `packages: write` (default).
#   - GHCR is set up to receive the package (first push auto-creates).
#
# To cut a release:
#   1. `bash scripts/release.sh <new-version>` (bumps package.json +
#      CHANGELOG + ha-app/config.yaml in lockstep)
#   2. Open chore(release): <ver> PR, merge to master
#   3. `git tag -a v<new-version> -m "Release <new-version>" && \
#       git push origin v<new-version>`
#   4. This workflow fires and publishes images for every arch.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push (${{ matrix.arch }})
    # Native runners per arch — `ubuntu-24.04-arm` is the free arm64
    # runner GitHub publishes for public repos. QEMU emulation was
    # tried first; SWC/Next.js hits ARM instructions QEMU TCG can't
    # emulate (Illegal instruction during `npm run build`), so we
    # switched to native ARM hardware. amd64 stays on the standard
    # ubuntu-latest runner.
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag + version
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (version $VERSION) for ${{ matrix.arch }}"

      - name: Verify ha-app/config.yaml version matches tag
        run: |
          CONFIG_VER=$(grep '^version:' ha-app/config.yaml | head -1 | awk '{print $2}' | tr -d '"' | tr -d "'")
          if [ "$CONFIG_VER" != "${{ steps.ver.outputs.version }}" ]; then
            echo "ERROR: ha-app/config.yaml version ($CONFIG_VER) does not match git tag (${{ steps.ver.outputs.version }})"
            echo "Bump ha-app/config.yaml via scripts/release.sh before tagging."
            exit 1
          fi

      # No setup-qemu — both runners are native to their target arch.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: ha-app
          file: ha-app/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            PRISM_REF=${{ steps.ver.outputs.tag }}
          push: true
          tags: |
            ghcr.io/sandydargoport/prism-ha-${{ matrix.arch }}:${{ steps.ver.outputs.version }}
            ghcr.io/sandydargoport/prism-ha-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
