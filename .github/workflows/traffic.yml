name: Track Traffic Stats

on:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  traffic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch traffic data from GitHub API
        env:
          # Traffic API requires Administration: Read, which the default
          # GITHUB_TOKEN cannot grant. TRAFFIC_PAT is a fine-grained PAT
          # scoped to this repo with Administration: Read + Contents: write.
          GH_TOKEN: ${{ secrets.TRAFFIC_PAT }}
          REPO: ${{ github.repository }}
        run: |
          # Per-endpoint paths matter: views/clones live at /traffic/<X>, but
          # referrers lives at /traffic/popular/referrers (NOT /traffic/referrers,
          # which 404s — that was the bug masking the referrer fetch as a "PAT
          # scope problem"). Tolerate per-endpoint failure with {} so one 4xx
          # doesn't take out the whole run.
          gh api "/repos/$REPO/traffic/views"             > /tmp/views.json     || echo "{}" > /tmp/views.json
          gh api "/repos/$REPO/traffic/clones"            > /tmp/clones.json    || echo "{}" > /tmp/clones.json
          gh api "/repos/$REPO/traffic/popular/referrers" > /tmp/referrers.json || echo "[]" > /tmp/referrers.json

      - name: Merge into history
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          from datetime import datetime, timezone

          def load(path, default):
              if os.path.exists(path):
                  with open(path) as f:
                      return json.load(f)
              return default

          def load_api(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except Exception as e:
                  print(f"Warning: could not parse {path}: {e}", file=sys.stderr)
                  return {}

          history = load('traffic/history.json', {
              'views': {},
              'clones': {},
              'referrers': [],
              'referrer_history': {},
              'window_uniques': {},
              'updated_at': None,
          })
          history.setdefault('referrer_history', {})
          history.setdefault('window_uniques', {})

          # Merge views — keyed by YYYY-MM-DD, newer run wins
          views_api = load_api('/tmp/views.json')
          for day in views_api.get('views', []):
              date = day['timestamp'][:10]
              history['views'][date] = {'count': day['count'], 'uniques': day['uniques']}

          # Capture today's TOP-LEVEL uniques — GitHub's 14-day rolling
          # deduplicated visitor count. Distinct from the per-day uniques
          # above (which double-count a returning visitor across days).
          # Stored keyed by the day the snapshot was taken so the viewer
          # can chart the rolling-window value over time and show
          # day-to-day deltas as "new this period."
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          if 'uniques' in views_api:
              history['window_uniques'][today] = views_api['uniques']

          # Merge clones
          for day in load_api('/tmp/clones.json').get('clones', []):
              date = day['timestamp'][:10]
              history['clones'][date] = {'count': day['count'], 'uniques': day['uniques']}

          # Referrers — GitHub returns a top-10 list over a rolling 14-day
          # window (no per-day breakdown is exposed). We keep two views:
          #   - history['referrers'] = the latest snapshot, for the dashboard's
          #     "Top Referrers (last 14 days)" table.
          #   - history['referrer_history'][YYYY-MM-DD] = today's snapshot,
          #     so we can chart referrer trends beyond GitHub's 14-day window.
          referrers_now = load_api('/tmp/referrers.json')
          if not isinstance(referrers_now, list):
              referrers_now = []
          history['referrers'] = referrers_now
          if referrers_now:  # don't overwrite a good snapshot with [] from a 4xx
              history['referrer_history'][today] = referrers_now

          history['updated_at'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          os.makedirs('traffic', exist_ok=True)
          with open('traffic/history.json', 'w') as f:
              json.dump(history, f, indent=2, sort_keys=True)

          total_views   = sum(d['count']   for d in history['views'].values())
          total_uniques = sum(d['uniques'] for d in history['views'].values())
          print(f"Days tracked: {len(history['views'])}  |  Total views: {total_views}  |  Total unique: {total_uniques}")
          PYEOF

      - name: Push to traffic-data branch
        # Pushing the daily refresh straight to master used to fail
        # because branch protection requires 5 status checks (the bot
        # has none). Switched to a dedicated, unprotected orphan-style
        # branch `traffic-data` that's overwritten daily. The viewer
        # page (traffic/index.html on master) fetches history.json
        # directly from this branch via raw.githubusercontent.com, so
        # users don't need to merge anything back into master.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create or reset the traffic-data branch with only the
          # traffic/ directory as content. Force-push keeps the branch
          # history shallow (one commit) and avoids merge conflicts.
          git checkout --orphan traffic-data
          git rm -rf --cached . > /dev/null
          git add traffic/
          git diff --staged --quiet && exit 0
          git commit -m "traffic stats $(date -u +%Y-%m-%d)"
          git push --force origin traffic-data
