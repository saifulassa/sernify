name: Validate Community Layouts

on:
  pull_request:
    paths:
      - 'community/layouts/**'
  push:
    branches:
      - master
    paths:
      - 'community/layouts/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate community layouts
        run: npx tsx scripts/validate-community-layouts.ts
