services:
  nginx:
    image: nginx:alpine
    container_name: sernify-nginx
    ports:
      - "4080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - sernify-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sernify-app
    ports:
      - "4003:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sernify:***@db:5432/sernify
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--dns-result-order=ipv4first
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - photos-cache:/app/cache/photos
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health/ready',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sernify-network

  db:
    image: postgres:15-alpine
    container_name: sernify-db
    environment:
      - POSTGRES_DB=sernify
      - POSTGRES_USER=sernify
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sernify -d sernify"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - sernify-network

  redis:
    image: redis:7-alpine
    container_name: sernify-redis
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sernify-network

volumes:
  postgres-data:
    name: sernify-postgres-data
  redis-data:
    name: sernify-redis-data
  photos-cache:
    name: sernify-photos-cache

networks:
  sernify-network:
    name: sernify-network
    driver: bridge
