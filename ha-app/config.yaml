name: Prism
version: "1.8.14"
slug: prism
description: Self-hosted family dashboard — calendars, tasks, photos, and more.
url: https://github.com/sandydargoport/prism
# Pre-built per-arch images published by .github/workflows/release.yml on
# every vX.Y.Z tag push. HA Supervisor substitutes {arch} per host and
# pulls the matching image — install becomes a 30-second pull instead of
# a 10-minute build from source. Until the first tag is pushed, this
# field references images that don't yet exist; users on that pre-1.8.5
# window will see HA Supervisor fall back to building the local
# Dockerfile (which works but is slow).
image: ghcr.io/sandydargoport/prism-ha-{arch}
arch:
  - amd64
  - aarch64
init: false
boot: auto
host_network: false
hassio_role: default
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: Web UI
ingress: false
panel_icon: mdi:view-dashboard-variant
panel_title: Prism
map:
  - data:rw
  - share:rw
  - media:rw
options:
  log_level: info
  bundled_db: true
  database_url: ""
  redis_url: ""
  photos_root: /data/photos
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  bundled_db: bool
  database_url: str?
  redis_url: str?
  photos_root: str
